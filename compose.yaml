services:
  honcho-mcp:
    build: .
    container_name: honcho-mcp
    ports:
      - "3000:3000"
    environment:
      - HONCHO_API_URL=${HONCHO_API_URL:-http://honcho-api-1:8000}
      - HONCHO_API_KEY=${HONCHO_API_KEY:-}
      - HONCHO_WORKSPACE_ID=${HONCHO_WORKSPACE_ID:-default}
      - PORT=3000
      - HOST=0.0.0.0
    networks:
      - honcho_default
    restart: unless-stopped

networks:
  honcho_default:
    external: true